<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEMPERATURE GAUGE v2.0 - CLASSROOM EDITION</title>
    <style>
        :root {
            --primary-color: #000080;
            --bg-color: #c0c0c0;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
            --win-border-black: #000000;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: #ffff00;
            width: 100%;
            padding: 10px;
            text-align: center;
            border: 3px outset var(--win-border-light);
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px #444;
        }

        /* --- THE GAUGE WINDOW --- */
        .gauge-window {
            background-color: var(--bg-color);
            border: 3px outset var(--win-border-light);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
        }

        /* Container for the thermometer and its markings */
        .thermometer-wrapper {
            display: flex;
            align-items: flex-end;
            position: relative;
            margin: 20px 0;
            padding-right: 60px; /* Space for the "paint" markings */
        }

        .thermometer-container {
            width: 50px;
            height: 450px; /* Longer gauge */
            background: #d1d1d1;
            border-top: 3px solid var(--win-border-dark);
            border-left: 3px solid var(--win-border-dark);
            border-right: 3px solid var(--win-border-light);
            border-bottom: 3px solid var(--win-border-light);
            position: relative;
            overflow: hidden;
        }

        #mercury {
            width: 100%;
            height: 20%; 
            position: absolute;
            bottom: 0;
            left: 0;
            /* Slower, smoother movement */
            transition: height 3s ease-in-out, background-color 3s ease-in-out;
            border-top: 2px solid rgba(255,255,255,0.5);
        }

        /* --- PAINT MARKINGS --- */
        .marking {
            position: absolute;
            right: -65px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333;
            border-bottom: 2px solid #555;
            width: 55px;
            padding-bottom: 2px;
        }

        .marking.gas { top: 5%; color: #800000; border-color: #800000; }
        .marking.ice { bottom: 5%; color: #000080; border-color: #000080; }

        /* --- UI ELEMENTS --- */
        .btn {
            background-color: var(--bg-color);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            padding: 10px 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:active {
            border-top: 2px solid var(--win-border-black);
            border-left: 2px solid var(--win-border-black);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
        }

        #status-display {
            margin-top: 15px;
            font-family: "Courier New", Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 8px;
            border: 2px inset var(--win-border-light);
            width: 200px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1><marquee behavior="alternate" scrollamount="3">TEMPERATURE SENSOR SYSTEM ONLINE</marquee></h1>
</header>

<div class="gauge-window">
    <div class="thermometer-wrapper">
        <div class="thermometer-container">
            <div id="mercury" style="background-color: #0000ff; height: 10%;"></div>
        </div>
        <div class="marking gas">GAS (Hot)</div>
        <div class="marking ice">ICE (Cold)</div>
    </div>

    <div id="status-display">READY...</div>
    <button class="btn" id="startBtn" onclick="toggleSimulation()">START ENGINE</button>
</div>

<script>
    let isRunning = false;
    let interval = null;
    const mercury = document.getElementById('mercury');
    const status = document.getElementById('status-display');
    const btn = document.getElementById('startBtn');

    function toggleSimulation() {
        if (isRunning) {
            clearInterval(interval);
            isRunning = false;
            btn.innerText = "START ENGINE";
            status.innerText = "HALTED";
        } else {
            isRunning = true;
            btn.innerText = "STOP ENGINE";
            status.innerText = "CALIBRATING...";
            runSimulation();
        }
    }

    function runSimulation() {
        const update = () => {
            // Random temp between 5 and 95
            const temp = Math.floor(Math.random() * 90) + 5;
            
            // Apply height
            mercury.style.height = temp + "%";

            // Calculate Color: 240 is Blue, 0 is Red.
            // When temp is high (95), hue is near 0. When temp is low (5), hue is near 240.
            const hue = 240 - (temp * 2.4);
            mercury.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;

            // Update Status text
            if (temp > 75) {
                status.innerText = "STATE: BOILING!";
                status.style.color = "#ff4444";
            } else if (temp < 25) {
                status.innerText = "STATE: FREEZING";
                status.style.color = "#4444ff";
            } else {
                status.innerText = "STATE: STABLE";
                status.style.color = "#00ff00";
            }
        };

        update(); // Run once immediately
        interval = setInterval(update, 5000); // Changes slowly every 5 seconds
    }
</script>

</body>
</html>
