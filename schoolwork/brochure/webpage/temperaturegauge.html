<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>TERMOMETER-SIMULATOR v5.0 - UTFORSKER</title>
    <style>
        :root {
            --primary-color: #000080;
            --bg-color: #c0c0c0;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
            --win-border-black: #000000;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #008080;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--primary-color);
            color: #ffff00;
            width: 100%;
            padding: 5px;
            text-align: center;
            border-bottom: 3px outset var(--win-border-light);
            z-index: 10;
        }

        .main-workspace {
            display: flex;
            flex-direction: row;
            margin-top: 30px;
            gap: 30px;
            align-items: flex-start;
            transition: all 0.6s ease-in-out;
        }

        /* --- KONTROLLPANEL --- */
        .sidebar {
            background-color: var(--bg-color);
            border: 3px outset var(--win-border-light);
            padding: 10px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .sidebar-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 8px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* --- TERMOMETER-BOKS (EKSPANDERBAR) --- */
        .gauge-window {
            background-color: var(--bg-color);
            border: 3px outset var(--win-border-light);
            padding: 20px 40px;
            display: flex;
            flex-direction: row;
            align-items: center; /* Sentrerer rør i boks */
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            position: relative;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 450px; /* Standard høyde */
        }

        /* Når utforsk-modus er på, blir boksen større */
        .gauge-window.expanded {
            height: 650px;
            margin-top: -50px;
        }

        .thermometer-tube {
            width: 50px;
            height: 100%; /* Følger høyden på boks */
            background: #999;
            border: 3px inset var(--win-border-light);
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease-in-out;
        }

        #mercury {
            width: 100%;
            height: 10%;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: height 0.5s linear, background-color 0.5s linear;
        }

        /* --- MARKERINGER --- */
        .markings-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 15px;
            transition: all 0.6s ease-in-out;
        }

        .marking {
            font-weight: bold;
            font-size: 14px;
            border-bottom: 2px solid #555;
            width: 140px;
            padding-bottom: 2px;
            transition: opacity 0.4s ease;
        }

        /* Ekstreme markeringer er usynlige som standard */
        .extreme {
            opacity: 0;
            color: #ff00ff;
        }
        .expanded .extreme {
            opacity: 1;
        }

        .marking.gas { color: #800000; }
        .marking.water { color: #006400; }
        .marking.ice { color: #000080; }

        /* --- KNAPPER --- */
        .btn {
            background-color: var(--bg-color);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            padding: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            border-top: 2px solid var(--win-border-black);
            border-left: 2px solid var(--win-border-black);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
        }

        /* UTFROSK-KNAPP I HJØRNET */
        #explore-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #ffff00;
            color: #000;
            z-index: 100;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        #status-display {
            margin-top: 10px;
            font-family: "Courier New", Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 5px;
            border: 2px inset var(--win-border-light);
            font-size: 13px;
            min-height: 35px;
        }
    </style>
</head>
<body>

<header>
    <h1><marquee scrollamount="3" width="60%">KLASSEROM-SIMULATOR v5.0</marquee></h1>
</header>

<div class="main-workspace">
    <div class="sidebar">
        <div class="sidebar-title">Kontrollmeny</div>
        <button class="btn" onclick="startDemo()">1. Rolig demo (bølge)</button>
        <button class="btn" onclick="startRandom(3000)">2. Tilfeldig (3 sek)</button>
        
        <div class="sidebar-title">Manuell styring</div>
        <button class="btn" onclick="adjustTemp(15)">++ Kraftig oppvarming</button>
        <button class="btn" onclick="adjustTemp(-15)">-- Kraftig nedkjøling</button>
        
        <hr>
        <button class="btn" style="color: #a00; text-align: center;" onclick="pauseSim()">[ PAUSE ]</button>
        
        <div id="status-display">SYSTEM KLAR...</div>
    </div>

    <div class="gauge-window" id="window">
        <div class="thermometer-tube">
            <div id="mercury"></div>
        </div>
        
        <div class="markings-container">
            <div class="marking extreme">PLASMA (Ionisert)</div>
            <div class="marking gas">DAMP (Gass)</div>
            <div class="marking water">VANN (Væske)</div>
            <div class="marking ice">IS (Fast form)</div>
            <div class="marking extreme">ABSOLUTT NULLPUNKT</div>
        </div>
    </div>
</div>

<button class="btn" id="explore-toggle" onclick="toggleExplore()">UTFORSK-MODUS</button>

<script>
    let interval = null;
    let currentTemp = 10;
    let demoDirection = 1;
    let isExpanded = false;
    
    const mercury = document.getElementById('mercury');
    const status = document.getElementById('status-display');
    const windowEl = document.getElementById('window');
    const exploreBtn = document.getElementById('explore-toggle');

    function toggleExplore() {
        isExpanded = !isExpanded;
        windowEl.classList.toggle('expanded');
        
        if (isExpanded) {
            exploreBtn.innerText = "STANDARD-MODUS";
            exploreBtn.style.backgroundColor = "#ff00ff";
            exploreBtn.style.color = "#fff";
            status.innerText = "UTFORSK-MODUS: EKSTREMER SYNLIG";
        } else {
            exploreBtn.innerText = "UTFORSK-MODUS";
            exploreBtn.style.backgroundColor = "#ffff00";
            exploreBtn.style.color = "#000";
            // Tving temperaturen tilbake hvis den er for høy/lav for standard boks
            if (currentTemp > 100) currentTemp = 100;
            if (currentTemp < 0) currentTemp = 0;
            updateVisuals(currentTemp, 0.5);
        }
    }

    function updateVisuals(temp, transitionTime) {
        // Justerer høyden i % basert på om vi har ekstra plass i røret
        let heightValue = temp;
        
        if (isExpanded) {
            // I utforsk-modus er 0-100 skalaen trykket litt sammen for å gi plass til toppen og bunnen
            // Vi mapper temp (-20 til 120) til en visuell høyde
            heightValue = ((temp + 20) / 140) * 100;
        }

        mercury.style.transition = `height ${transitionTime}s ease-in-out, background-color ${transitionTime}s linear`;
        mercury.style.height = heightValue + "%";
        
        // Farge: Blå -> Grønn -> Rød -> Lilla (Plasma)
        let hue = 240 - (temp * 2.4);
        if (temp > 100) hue = 300; // Lilla for plasma
        if (temp < 0) hue = 200; // Lysere blå for ekstrem kulde

        mercury.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
        
        // Tekstoppdatering
        if (temp > 110) status.innerText = "STATUS: PLASMA (EKSTREMT VARMT)";
        else if (temp > 85) status.innerText = "STATUS: DAMP / KOKING";
        else if (temp < -10) status.innerText = "STATUS: ABSOLUTT NULLPUNKT";
        else if (temp < 15) status.innerText = "STATUS: IS / FROST";
        else status.innerText = "STATUS: FLYTENDE VANN";
    }

    function adjustTemp(amount) {
        pauseSim();
        currentTemp += amount;
        
        // Grenser
        const max = isExpanded ? 120 : 100;
        const min = isExpanded ? -20 : 0;
        
        if (currentTemp > max) currentTemp = max;
        if (currentTemp < min) currentTemp = min;
        
        updateVisuals(currentTemp, 0.5);
    }

    function pauseSim() {
        clearInterval(interval);
        status.innerText = "STATUS: PAUSET";
    }

    function startDemo() {
        pauseSim();
        status.innerText = "MODUS: ROLIG";
        interval = setInterval(() => {
            currentTemp += (1 * demoDirection);
            const limit = isExpanded ? 115 : 95;
            const bottom = isExpanded ? -15 : 5;
            
            if (currentTemp >= limit) demoDirection = -1;
            if (currentTemp <= bottom) demoDirection = 1;
            updateVisuals(currentTemp, 0.1);
        }, 150);
    }

    function startRandom(speed) {
        pauseSim();
        const jump = () => {
            const max = isExpanded ? 115 : 90;
            const min = isExpanded ? -15 : 10;
            currentTemp = Math.floor(Math.random() * (max - min)) + min;
            updateVisuals(currentTemp, speed/1500); 
        };
        jump();
        interval = setInterval(jump, speed);
    }

    // Start
    updateVisuals(currentTemp, 0.5);
</script>

</body>
</html>
