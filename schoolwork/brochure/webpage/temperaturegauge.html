<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>TERMOMETER-SIMULATOR v6.0 </title>
    <style>
        :root {
            --primary-color: #000080;
            --bg-color: #c0c0c0;
            --win-border-light: #ffffff;
            --win-border-dark: #808080;
            --win-border-black: #000000;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #008080;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--primary-color);
            color: #ffff00;
            width: 100%;
            padding: 5px;
            text-align: center;
            border-bottom: 3px outset var(--win-border-light);
            z-index: 10;
        }

        .main-workspace {
            display: flex;
            flex-direction: row;
            margin-top: 30px;
            gap: 30px;
            align-items: flex-start;
        }

        /* --- KONTROLLPANEL --- */
        .sidebar {
            background-color: var(--bg-color);
            border: 3px outset var(--win-border-light);
            padding: 10px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        .sidebar-title {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 8px;
            font-size: 14px;
            font-weight: bold;
        }

        /* --- TERMOMETER-BOKS --- */
        .gauge-window {
            background-color: var(--bg-color);
            border: 3px outset var(--win-border-light);
            padding: 30px 50px;
            display: flex;
            flex-direction: row;
            align-items: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            position: relative;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 450px;
        }

        .gauge-window.expanded {
            height: 600px;
            margin-top: -30px;
        }

        .thermometer-tube {
            width: 50px;
            height: 100%;
            background: #999;
            border: 3px inset var(--win-border-light);
            position: relative;
            overflow: hidden;
        }

        #mercury {
            width: 100%;
            height: 10%;
            position: absolute;
            bottom: 0;
            left: 0;
            transition: height 0.5s linear, background-color 0.5s linear;
        }

        /* --- MARKERINGER --- */
        .markings-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 20px;
        }

        .marking {
            font-weight: bold;
            font-size: 14px;
            border-bottom: 2px solid #555;
            width: 180px;
            padding-bottom: 2px;
            transition: opacity 0.4s ease;
            white-space: nowrap;
        }

        .extreme { opacity: 0; display: none; color: #ff00ff; }
        .expanded .extreme { opacity: 1; display: block; }

        .marking.gas { color: #800000; }
        .marking.water { color: #006400; }
        .marking.ice { color: #000080; }

        /* --- KNAPPER --- */
        .btn {
            background-color: var(--bg-color);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            padding: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active {
            border-top: 2px solid var(--win-border-black);
            border-left: 2px solid var(--win-border-black);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
        }

        #explore-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #ffff00;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
        }

        #status-display {
            margin-top: 10px;
            font-family: "Courier New", Courier, monospace;
            background: #000;
            color: #0f0;
            padding: 5px;
            border: 2px inset var(--win-border-light);
            font-size: 13px;
            min-height: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1><marquee scrollamount="2" width="50%">TERMOMETER-SIMULATOR v6.0</marquee></h1>
</header>

<div class="main-workspace">
    <div class="sidebar">
        <div class="sidebar-title">Modus</div>
        <button class="btn" onclick="startDemo()">Bølge (Rolig)</button>
        <button class="btn" onclick="startRandom(3000)">Tilfeldig (3s)</button>
        
        <div class="sidebar-title">Temperaturstyring</div>
        <button class="btn" onclick="adjustTemp(20)">Varme ++</button>
        <button class="btn" onclick="adjustTemp(-20)">Kulde --</button>
        
        <hr>
        <button class="btn" style="color: #a00; text-align: center;" onclick="pauseSim()">[ PAUSE ]</button>
        
        <div id="status-display">KLAR...</div>
    </div>

    <div class="gauge-window" id="window">
        <div class="thermometer-tube">
            <div id="mercury"></div>
        </div>
        
        <div class="markings-container">
            <div class="marking extreme">200°C - Overopphetet damp</div>
            <div class="marking gas">100°C - Damp (Gass)</div>
            <div class="marking water">50°C - Vann (Væske)</div>
            <div class="marking ice">0°C - Is (Fast form)</div>
            <div class="marking extreme">-273°C - Absolutt nullpunkt</div>
        </div>
    </div>
</div>

<button class="btn" id="explore-toggle" onclick="toggleExplore()">UTFORSK-MODUS</button>

<script>
    let interval = null;
    let currentTemp = 10;
    let demoDirection = 1;
    let isExpanded = false;
    
    const mercury = document.getElementById('mercury');
    const status = document.getElementById('status-display');
    const windowEl = document.getElementById('window');
    const exploreBtn = document.getElementById('explore-toggle');

    function toggleExplore() {
        isExpanded = !isExpanded;
        windowEl.classList.toggle('expanded');
        
        if (isExpanded) {
            exploreBtn.innerText = "STANDARD-MODUS";
            exploreBtn.style.backgroundColor = "#ff00ff";
            exploreBtn.style.color = "#fff";
            status.innerText = "UTFORSK-MODUS: EKSTREMER AKTIVERT";
        } else {
            exploreBtn.innerText = "UTFORSK-MODUS";
            exploreBtn.style.backgroundColor = "#ffff00";
            exploreBtn.style.color = "#000";
            if (currentTemp > 100) currentTemp = 100;
            if (currentTemp < 0) currentTemp = 0;
            updateVisuals(currentTemp, 0.5);
        }
    }

    function updateVisuals(temp, transitionTime) {
        let heightValue = temp;
        
        if (isExpanded) {
            // Mapper -20 til 120 (vårt visuelle område) til 0-100% høyde
            heightValue = ((temp + 20) / 140) * 100;
        }

        mercury.style.transition = `height ${transitionTime}s ease-in-out, background-color ${transitionTime}s linear`;
        mercury.style.height = heightValue + "%";
        
        // Fargelogikk
        let hue;
        if (temp > 100) {
            // Går mot hvitt/oransje for super-damp
            hue = 20; 
        } else if (temp < 0) {
            hue = 200; 
        } else {
            hue = 240 - (temp * 2.4);
        }

        mercury.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
        
        // Statusmeldinger basert på temperatur
        if (temp > 100) status.innerText = `STATUS: ${temp > 110 ? 'KRITISK DAMP-TRYKK!' : 'OVEROPPHETET DAMP'}`;
        else if (temp >= 100) status.innerText = "STATUS: DAMP (GASS)";
        else if (temp > 0) status.innerText = "STATUS: FLYTENDE VANN";
        else if (temp === 0) status.innerText = "STATUS: FRYSEPUNKT";
        else status.innerText = "STATUS: EKSTREM KULDE";
    }

    function adjustTemp(amount) {
        pauseSim();
        currentTemp += amount;
        const max = isExpanded ? 120 : 100;
        const min = isExpanded ? -20 : 0;
        if (currentTemp > max) currentTemp = max;
        if (currentTemp < min) currentTemp = min;
        updateVisuals(currentTemp, 0.5);
    }

    function pauseSim() {
        clearInterval(interval);
        status.innerText = "STATUS: PAUSET";
    }

    function startDemo() {
        pauseSim();
        status.innerText = "MODUS: ROLIG";
        interval = setInterval(() => {
            currentTemp += (1 * demoDirection);
            const limit = isExpanded ? 115 : 95;
            const bottom = isExpanded ? -15 : 5;
            if (currentTemp >= limit) demoDirection = -1;
            if (currentTemp <= bottom) demoDirection = 1;
            updateVisuals(currentTemp, 0.1);
        }, 150);
    }

    function startRandom(speed) {
        pauseSim();
        const jump = () => {
            const max = isExpanded ? 115 : 90;
            const min = isExpanded ? -15 : 10;
            currentTemp = Math.floor(Math.random() * (max - min)) + min;
            updateVisuals(currentTemp, speed/1500); 
        };
        jump();
        interval = setInterval(jump, speed);
    }

    updateVisuals(currentTemp, 0.5);
</script>

</body>
</html>
